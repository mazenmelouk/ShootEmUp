<!DOCTYPE HTML>
<html>

<head>
  <title>Shoot 'em Up</title>
  <link rel="shortcut icon" href="img//icon.ico">
  <link href="css/style.css" rel="stylesheet" />
</head>

<body>
  <audio id="bullet">
    <source src="sounds/shoot_3d.ogg" type="audio/ogg">
  </audio>
  <audio id="blast">
    <source src="sounds/bomb.wav" type="audio/wav">
  </audio>
  <audio id="bigBlast">
    <source src="sounds/bigBlast.ogg" type="audio/ogg">
  </audio>
  <audio id="bg1" loop>
    <source src="sounds/bg-music_1.ogg" type="audio/ogg">
  </audio>
  <audio id="bg2" loop>
    <source src="sounds/bg-music_2.ogg" type="audio/ogg">
  </audio>
  <audio id="start">
    <source src="sounds/cross.ogg" type="audio/ogg">
  </audio>
  <audio id="shieldCharge">
    <source src="sounds/shield_charge.ogg" type="audio/ogg">
  </audio>
  <audio id="whoosh">
    <source src="sounds/whoosh.wav" type="audio/wav">
  </audio>
  <script src="js/main.js"></script>
</body>

</html>
